<!DOCTYPE html>
<html>
<head>
    <title>Manage Transfers - SuperAdmin</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="main-header">
    <div class="header-left">
        <span id="userInfo" class="user-info"></span>
    </div>

    <h2>Manage Transfers</h2>

    <div class="header-right">
        <a href="superadmin-notifications.html" class="notification-btn">
            Notifications
        </a>
        <button class="logout" onclick="logout()">Logout</button>
    </div>
</header>

<nav class="navigation">
    <a href="superadmin-dashboard.html">Dashboard</a>
    <a href="superadmin-concerns.html">Concerns</a>
    <a href="superadmin-machines.html">Machines</a>
    <a href="superadmin-users.html">Users</a>
    <a href="superadmin-transfers.html" class="active">Transfers</a>
    <a href="superadmin-register.html">Register User</a>
    <a href="superadmin-profile.html">Profile</a>
</nav>

<div class="container">
    <div class="card">
        <h3>Initiate Transfer</h3>
        <form onsubmit="event.preventDefault(); initiateTransfer();">
            <input type="number" id="transferMachineId" placeholder="Machine ID" required>
            <select id="transferToConcern" required>
                <option value="">Select Target Concern</option>
            </select>
            <button type="submit">Initiate Transfer</button>
        </form>
        <p id="initiateMsg" class="message"></p>
    </div>

    <div class="card">
        <h3>Receive Transfer</h3>
        <form onsubmit="event.preventDefault(); receiveTransfer();">
            <input type="number" id="receiveTransferId" placeholder="Transfer ID" required>
            <button type="submit">Receive Transfer</button>
        </form>
        <p id="receiveMsg" class="message"></p>
    </div>

    <div class="card">
        <h3>Return Machine</h3>
        <form onsubmit="event.preventDefault(); returnTransfer();">
            <input type="number" id="returnTransferId" placeholder="Transfer ID" required>
            <button type="submit">Return Machine</button>
        </form>
        <p id="returnMsg" class="message"></p>
    </div>

    <div class="card">
        <h3>All Transfers</h3>
        <button onclick="loadTransfers()">Refresh</button>
        <table id="transferTable">
            <thead>
            <tr>
                <th>ID</th>
                <th>Machine</th>
                <th>From</th>
                <th>To</th>
                <th>Status</th>
                <th>Initiated</th>
                <th>Completed</th>
                <th>Returned</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script src="js/api.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        displayUserInfo();
        loadConcerns();
        loadTransfers();
    });

    async function loadConcerns() {
        try {
            const concerns = await apiRequest("/superadmin/concerns");
            const select = document.getElementById("transferToConcern");
            select.innerHTML = '<option value="">Select Target Concern</option>';

            concerns.forEach(c => {
                select.innerHTML += `<option value="${c.name}">${c.name}</option>`;
            });
        } catch (err) {
            console.error("Error loading concerns:", err);
        }
    }

    async function initiateTransfer() {
        const machineId = document.getElementById("transferMachineId").value;
        const toConcernName = document.getElementById("transferToConcern").value;
        const msg = document.getElementById("initiateMsg");

        try {
            const result = await apiRequest(`/transfer/initiate?machineId=${machineId}&toConcernName=${encodeURIComponent(toConcernName)}`, "POST");
            msg.textContent = `Transfer initiated! Transfer ID: ${result.id}`;
            msg.style.color = "green";
            document.getElementById("transferMachineId").value = "";
            document.getElementById("transferToConcern").value = "";
            loadTransfers();
        } catch (err) {
            msg.textContent = "Error: " + err.message;
            msg.style.color = "red";
        }
    }

    async function receiveTransfer() {
        const transferId = document.getElementById("receiveTransferId").value;
        const msg = document.getElementById("receiveMsg");

        try {
            const result = await apiRequest(`/transfer/receive?transferId=${transferId}`, "POST");
            msg.textContent = `Transfer received! Status: ${result.status}`;
            msg.style.color = "green";
            document.getElementById("receiveTransferId").value = "";
            loadTransfers();
        } catch (err) {
            msg.textContent = "Error: " + err.message;
            msg.style.color = "red";
        }
    }

    async function returnTransfer() {
        const transferId = document.getElementById("returnTransferId").value;
        const msg = document.getElementById("returnMsg");

        try {
            const result = await apiRequest(`/transfer/return?transferId=${transferId}`, "POST");
            msg.textContent = `Machine returned! Status: ${result.status}`;
            msg.style.color = "green";
            document.getElementById("returnTransferId").value = "";
            loadTransfers();
        } catch (err) {
            msg.textContent = "Error: " + err.message;
            msg.style.color = "red";
        }
    }

    async function loadTransfers() {
        try {
            const transfers = await apiRequest("/superadmin/transfers");
            const tbody = document.querySelector("#transferTable tbody");
            tbody.innerHTML = "";

            if (transfers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="9">No transfers found</td></tr>';
                return;
            }

            transfers.forEach(t => {
                tbody.innerHTML += `
                <tr>
                    <td>${t.id}</td>
                    <td>${t.machines?.code || '-'}</td>
                    <td>${t.fromConcern?.name || '-'}</td>
                    <td>${t.toConcern?.name || '-'}</td>
                    <td><span class="status-badge status-${t.status}">${t.status}</span></td>
                    <td>${formatDateTime(t.initiatedAt)}</td>
                    <td>${formatDateTime(t.completedAt)}</td>
                    <td>${formatDateTime(t.returnedAt)}</td>
                    <td>
                        <button class="btn-danger" onclick="deleteTransfer(${t.id})">Delete</button>
                    </td>
                </tr>
            `;
            });
        } catch (err) {
            alert("Error loading transfers: " + err.message);
        }
    }

    async function deleteTransfer(id) {
        if (!confirm("Delete this transfer record?")) return;

        try {
            await apiRequest(`/superadmin/transfers/${id}`, "DELETE");
            alert("Transfer deleted!");
            loadTransfers();
        } catch (err) {
            alert("Error: " + err.message);
        }
    }
</script>

</body>
</html>
